{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card p-4">
      <h3 class="mb-3">Вход</h3>

      <form method="post">
        {% csrf_token %}

        {% if form.non_field_errors %}
          <div class="alert alert-danger">
            {{ form.non_field_errors }}
          </div>
        {% endif %}

        <div class="mb-3">
          <label class="form-label">Имя пользователя</label>
          {{ form.username }}
        </div>

        <div class="mb-3">
          <label class="form-label">Пароль</label>
          {{ form.password }}
        </div>

        <button class="btn btn-success w-100" type="submit">Войти</button>
      </form>
    </div>
  </div>
</div>

<script>
  // чуть улучшим вид полей
  const u = document.getElementById("id_username");
  const p = document.getElementById("id_password");
  if (u) u.classList.add("form-control");
  if (p) p.classList.add("form-control");
</script>

{% endblock %}
