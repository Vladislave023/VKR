<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ЭБ ДВФУ — подача ВКР{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  body {
    background: #eef1f6;
    color: #212529;
  }

  .card {
    background: #ffffff;
    border: 1px solid rgba(0, 0, 0, 0.10);
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
  }

  .table {
    border-color: rgba(0, 0, 0, 0.08);
  }

  .table thead th {
    border-bottom-color: rgba(0, 0, 0, 0.10);
    font-weight: 600;
  }

  .form-control,
  .form-select {
    border: 1px solid rgba(0, 0, 0, 0.18);
    border-radius: 12px;
    background-color: #fff;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  .form-control:focus,
  .form-select:focus {
    border-color: rgba(25, 135, 84, 0.55);
    box-shadow: 0 0 0 0.20rem rgba(25, 135, 84, 0.15);
  }

  .form-control.is-invalid,
  .form-select.is-invalid {
    border-color: #dc3545;
    box-shadow: 0 0 0 0.18rem rgba(220, 53, 69, 0.12);
  }

  .form-control.is-valid,
  .form-select.is-valid {
    border-color: #198754;
    box-shadow: 0 0 0 0.18rem rgba(25, 135, 84, 0.08);
  }

  .invalid-feedback {
    display: block;
    font-size: 0.875rem;
    margin-top: 0.35rem;
  }

  .section-title {
    font-weight: 700;
    margin-top: 6px;
    margin-bottom: 10px;
  }

  .soft-divider {
    height: 1px;
    background: rgba(0, 0, 0, 0.08);
    margin: 16px 0;
  }

  .navbar-brand {
    font-weight: 600;
  }

  .btn {
    border-radius: 10px;
  }

  .badge {
    font-weight: 500;
  }

  .text-secondary.small,
  .form-text {
    color: #6c757d !important;
  }

  #selectedFileName {
    word-break: break-word;
  }

  @media (max-width: 768px) {
    .card {
      border-radius: 14px;
    }
  }
</style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
      <a class="navbar-brand" href="/">Электронная библиотека — ВКР</a>

      <div class="ms-auto d-flex align-items-center gap-2">
        {% if request.user.is_authenticated %}
          <span class="text-white-50 small">{{ request.user.username }}</span>

          <a class="btn {% if request.path == '/submissions/' %}btn-light{% else %}btn-outline-light{% endif %} btn-sm"
             href="/submissions/">
            Мои заявки
          </a>

          <a class="btn {% if request.path == '/submissions/new/' %}btn-light{% else %}btn-outline-light{% endif %} btn-sm"
             href="/submissions/new/">
            Подать ВКР
          </a>

          <a class="btn {% if request.path == '/logout/' %}btn-light{% else %}btn-outline-light{% endif %} btn-sm"
             href="/logout/">
            Выход
          </a>
        {% else %}
          <a class="btn {% if request.path == '/login/' %}btn-light{% else %}btn-outline-light{% endif %} btn-sm"
             href="/login/">
            Вход
          </a>
        {% endif %}
      </div>
    </div>
  </nav>

<main class="container my-4">
  {% if messages %}
    {% for m in messages %}
      <div class="alert alert-info">{{ m }}</div>
    {% endfor %}
  {% endif %}

  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
