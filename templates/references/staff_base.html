<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Справочники{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6f8; color: #212529; }
    .card { border-radius: 8px; border-color: rgba(0, 0, 0, 0.1); }
    .stat { border-radius: 8px; background: #fff; border: 1px solid rgba(0, 0, 0, 0.1); }
    .table th { font-weight: 600; white-space: nowrap; }
    pre { white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="{% url 'references:dashboard' %}">Справочники</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#staffNav" aria-controls="staffNav" aria-expanded="false" aria-label="Навигация">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="staffNav">
        <div class="navbar-nav me-auto">
          <a class="nav-link" href="{% url 'references:dashboard' %}">Справочники</a>
          <a class="nav-link" href="{% url 'references:import_list' %}">История импортов</a>
          <a class="nav-link" href="/submissions/">Заявки</a>
        </div>
        <div class="navbar-nav">
          <span class="navbar-text me-3">{{ request.user.username }}</span>
          <a class="nav-link" href="/logout/">Выйти</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="container my-4">
    {% if messages %}
      {% for message in messages %}
        <div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-{{ message.tags|default:'info' }}{% endif %}">{{ message }}</div>
      {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
